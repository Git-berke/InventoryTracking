name: ci

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore PTN.InventoryTracking.slnx

      - name: Build solution
        run: dotnet build PTN.InventoryTracking.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test PTN.InventoryTracking.slnx --configuration Release --no-build
